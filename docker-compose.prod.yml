version: '3.8'

services:
  web:
    container_name: turfbook-frontend-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      # Note: Next.js inlines NEXT_PUBLIC_* variables during build time.
      # You can override these arguments during build using:
      # docker compose -f docker-compose.prod.yml build --build-arg NEXT_PUBLIC_API_URL="your_url"
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: always

version: '3.8'

services:
  web:
    container_name: turfbook-frontend-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Anonymous volumes to prevent overwriting container node_modules & .next directories
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WATCHPACK_POLLING=true # Ensures HMR works inside the container filesystem
